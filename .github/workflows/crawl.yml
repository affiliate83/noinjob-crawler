name: noinjob 자동 크롤링

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 KST 10:00 (UTC 01:00)
  workflow_dispatch:       # GitHub에서 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: .env 생성
        run: |
          cat > .env << 'EOF'
          WP_URL=${{ secrets.WP_URL }}
          WP_USER=${{ secrets.WP_USER }}
          WP_APP_PASS=${{ secrets.WP_APP_PASS }}
          DATA_GO_KR_API_KEY=${{ secrets.DATA_GO_KR_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: 크롤링 실행
        run: python crawler/main.py

      - name: dedup.db 커밋 (중복방지 DB 업데이트)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dedup.db
          git diff --staged --quiet || git commit -m "chore: dedup.db 업데이트 $(date +'%Y-%m-%d')"
          git push
