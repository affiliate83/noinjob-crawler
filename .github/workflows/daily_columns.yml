name: 칼럼 초안 생성 (하루 1개)

on:
  # schedule 비활성화 — AdSense 심사 중 자동 발행 중단
  # 심사 완료 후 아래 주석을 해제하면 매일 KST 11:00 자동 실행됩니다:
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:       # GitHub에서 수동 실행 가능

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 칼럼 초안 1개 생성
        run: python crawler/daily_columns.py
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
