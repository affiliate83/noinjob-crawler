name: 칼럼 자동 발행 (하루 2개)

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 KST 11:00 (UTC 02:00)
  workflow_dispatch:       # GitHub에서 수동 실행 가능

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: .env 생성
        run: |
          cat > .env << 'EOF'
          WP_URL=${{ secrets.WP_URL }}
          WP_USER=${{ secrets.WP_USER }}
          WP_APP_PASS=${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          EOF

      - name: 칼럼 2개 자동 발행
        run: python crawler/daily_columns.py
